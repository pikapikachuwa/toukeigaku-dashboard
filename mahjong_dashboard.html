<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統計学WG 戦績ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;background:#f5f5f0;color:#222;min-height:100vh;padding:1.5rem;}
.container{max-width:1100px;margin:0 auto;}
.dash-header{display:flex;align-items:baseline;justify-content:space-between;padding:0 0 0.75rem;border-bottom:1px solid #ddd;margin-bottom:1.25rem;flex-wrap:wrap;gap:6px;}
.dash-title{font-size:18px;font-weight:600;color:#111;}
.dash-meta{font-size:12px;color:#888;margin-left:10px;}
.medal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1rem;}
@media(max-width:600px){.medal-grid{grid-template-columns:1fr;}}
.medal-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;}
.medal-card.gold{border-color:#c9a84c;background:#fffdf5;}
.medal-card.silver{border-color:#aaa;background:#fafafa;}
.medal-card.bronze{border-color:#b87333;background:#fff9f5;}
.medal-label{font-size:11px;color:#888;margin-bottom:2px;}
.medal-name{font-size:17px;font-weight:600;margin-bottom:5px;}
.medal-pts{font-size:24px;font-weight:700;}
.medal-sub{font-size:11px;color:#888;margin-top:4px;}
.pos{color:#1a9e5c;}.neg{color:#d63a3a;}
.chart-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.chart-title{font-size:13px;font-weight:600;color:#555;margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.tab-btns{display:flex;gap:4px;flex-wrap:wrap;}
.tab-btn{font-size:11px;padding:3px 10px;border-radius:6px;background:transparent;border:1px solid #ccc;color:#666;cursor:pointer;transition:all 0.15s;}
.tab-btn:hover{background:#f0f0f0;}
.tab-btn.active{background:#333;color:#fff;border-color:#333;}
.tbl-wrap{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tbl th{padding:6px 9px;font-size:10px;color:#777;font-weight:600;white-space:nowrap;border-bottom:2px solid #eee;text-align:right;background:#fafafa;}
.tbl th.left{text-align:left;}.tbl th.center{text-align:center;}
.tbl td{padding:6px 9px;white-space:nowrap;border-bottom:1px solid #f0f0f0;text-align:right;}
.tbl td.left{text-align:left;font-weight:600;}.tbl td.center{text-align:center;font-size:13px;}
.tbl tr:hover td{background:#f9f9f9;}
.sep{border-left:2px solid #eee;}
.grp{font-size:9px;color:#aaa;text-align:center;padding:3px 4px;background:#f5f5f5;border-bottom:1px solid #eee;}

.rank-board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
@media(max-width:700px){.rank-board{grid-template-columns:1fr;}}
.rank-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px 14px;}
.rank-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rank-badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;color:#fff;}
.rank-badge.konten {background:linear-gradient(135deg,#b8860b,#ffd700);color:#222;}
.rank-badge.jusei  {background:linear-gradient(135deg,#6a0dad,#c471ed);}
.rank-badge.jugo   {background:linear-gradient(135deg,#1565c0,#42a5f5);}
.rank-badge.juketsu{background:linear-gradient(135deg,#2e7d32,#66bb6a);}
.rank-badge.jushi  {background:linear-gradient(135deg,#546e7a,#90a4ae);}
.rank-badge.shoshin{background:linear-gradient(135deg,#795548,#bcaaa4);}
.rank-member{font-weight:700;font-size:13px;}
.rank-pt-row{display:flex;justify-content:space-between;font-size:11px;color:#555;margin-bottom:6px;}
.rank-pt-val{font-weight:700;}
.rank-bar-wrap{background:#f0f0f0;border-radius:4px;height:8px;margin-bottom:6px;overflow:hidden;}
.rank-bar-fill{height:100%;border-radius:4px;transition:width .3s;}
.rank-next{font-size:11px;color:#444;line-height:1.6;}
.rank-next .highlight{font-weight:700;color:#1a5276;}
.rank-next .warn{color:#c0392b;font-weight:700;}
.rank-next .good{color:#1a7c3e;font-weight:700;}
</style>
</head>

const sorted = [...DATA].sort((a,b) => b.totalPts - a.totalPts);
function pc(n){ return n > 0 ? 'pos' : n < 0 ? 'neg' : ''; }
function ps(n){ return n == null ? '-' : (n > 0 ? '+' : '') + n; }
function f1(n){ return n == null ? '-' : Number(n).toFixed(1); }
function f2(n){ return n == null ? '-' : Number(n).toFixed(2); }
function pct(n){ return n == null ? '-' : f1(n) + '%'; }

function buildMedals(){
  const grid = document.getElementById('medal-grid');
  ['gold','silver','bronze'].forEach((cls, i) => {
    const s = sorted[i];
    const labels = ['🥇 1位','🥈 2位','🥉 3位'];
    const rd = RANK_DATA[s.name];
    const t = rd ? getRankInfo(rd.totalPt) : null;
    const badge = t ? '<span class="rank-badge '+t.cls+'" style="font-size:10px;padding:2px 7px;margin-left:6px;">'+t.rank+t.grade+'</span>' : '';
    const rankPt = rd ? '<div style="font-size:11px;color:#888;margin-top:3px;">WGランクPt: <b style="color:'+(rd.totalPt>=0?'#1a7c3e':'#c00000')+'">'+(rd.totalPt>=0?'+':'')+rd.totalPt+'</b> ／ <b style="color:'+(rd.ptg>=0?'#1a7c3e':'#c00000')+'">'+(rd.ptg>=0?'+':'')+rd.ptg+'/G</b></div>' : '';
    const c = document.createElement('div');
    c.className = 'medal-card ' + cls;
    c.innerHTML = '<div class="medal-label">' + labels[i] + '</div>'
      + '<div class="medal-name" style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2px;">' + dn(s.name) + badge + '</div>'
      + '<div class="medal-pts ' + pc(s.totalPts) + '">' + ps(s.totalPts) + ' pts（Season3）</div>'
      + rankPt
      + '<div class="medal-sub" style="margin-top:4px;">平均順位 ' + f2(s.avgRank) + ' ／ Top率 ' + pct(s.topRate) + ' ／ 連帯率 ' + pct(s.renRate) + '</div>';
    grid.appendChild(c);
  });
}

function buildLineChart(){
  const ctx = document.getElementById('line-chart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: TREND.map(d => d.date),
      datasets: MEMBERS.map((m, i) => ({
        label:dn(m),data:TREND.map(d => d[m]),
        borderColor: COLORS[i], backgroundColor: COLORS[i],
        borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, tension: 0.3, spanGaps: true
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12, padding: 6 } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

let barChart = null;
function switchBar(key, label, btn){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('bar-label').textContent = label;
  const byVal = [...DATA].sort((a,b) => key === 'avgRank' ? a[key]-b[key] : b[key]-a[key]);
  const vals = byVal.map(d => d[key]);
  const isRate = ['topRate','renRate','avoidRate','lastRate','plusRate'].includes(key);
  const bc = vals.map(v => key === 'avgRank'
    ? (v <= 2.5 ? 'rgba(26,158,92,0.75)' : 'rgba(214,58,58,0.75)')
    : (v >= 0   ? 'rgba(74,144,217,0.75)' : 'rgba(214,58,58,0.75)'));
  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('bar-chart').getContext('2d'), {
    type: 'bar',
    data: { labels: byVal.map(d => dn(d.name)), datasets: [{ data: vals, backgroundColor: bc, borderRadius: 4, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => {
          const v = ctx.raw;
          if(key === 'avgRank') return f2(v);
          if(isRate) return f1(v) + '%';
          return ps(f1(v));
        }}}
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 }, callback: v => isRate ? v + '%' : v } }
      }
    }
  });
}

function renderTable(sortKey, btn){
  if(btn){
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  let s;
  if(sortKey === 'member'){
    s = MEMBER_ORDER.map(name => DATA.find(d => d.name === name)).filter(Boolean);
  } else if(sortKey === 'avgRank'){
    s = [...DATA].sort((a,b) => a[sortKey]-b[sortKey]);
  } else {
    s = [...DATA].sort((a,b) => b[sortKey]-a[sortKey]);
  }
  const tbody = document.getElementById('detail-tbody');
  tbody.innerHTML = '';
  s.forEach(d => {
    const rank = sorted.findIndex(x => x.name === d.name) + 1;
    const medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':String(rank);
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="center">' + medal + '</td>'
      + '<td class="left">' + dn(d.name) + '</td>'
      + '<td class="sep">' + d.games + '</td><td>' + f2(d.avgRank) + '</td>'
      + '<td class="sep">' + pct(d.topRate) + '</td><td>' + pct(d.renRate) + '</td><td>' + pct(d.avoidRate) + '</td>'
      + '<td class="' + pc(-d.lastRate) + '">' + pct(d.lastRate) + '</td>'
      + '<td class="' + pc(d.plusRate-50) + '">' + pct(d.plusRate) + '</td>'
      + '<td class="sep">' + f1(d.stdDev) + '</td>'
      + '<td class="' + pc(d.avgPts1st) + '">' + ps(f1(d.avgPts1st)) + '</td>'
      + '<td class="' + pc(d.avgPts4th) + '">' + ps(f1(d.avgPts4th)) + '</td>'
      + '<td class="sep">' + f2(d.recent20AvgRank) + '</td>'
      + '<td class="sep ' + pc(d.totalPts) + '" style="font-weight:700;">' + ps(d.totalPts) + '</td>'
      + '<td class="' + pc(d.ptsPerGame) + '">' + ps(f1(d.ptsPerGame)) + '</td>'
      + '<td class="' + pc(d.maxPts) + '">' + ps(d.maxPts) + '</td>'
      + '<td class="' + pc(d.minPts) + '">' + ps(d.minPts) + '</td>'
      + '<td class="sep">' + d.r1 + '</td><td>' + d.r2 + '</td><td>' + d.r3 + '</td><td>' + d.r4 + '</td>';
    tbody.appendChild(tr);
  });
}

// ===== WGランクシステム =====
const RANK_DATA = {
  '土岐': {inheritPt:954,s3Pt:2007,totalPt:2961,ptg:22.3,s3Games:90},
  '藤木': {inheritPt:16,s3Pt:-176,totalPt:-160,ptg:-16.0,s3Games:11},
  '鹿山': {inheritPt:737,s3Pt:-317,totalPt:420,ptg:-11.7,s3Games:27},
  '河井': {inheritPt:-915,s3Pt:-498,totalPt:-1413,ptg:-12.4,s3Games:40},
  '松林': {inheritPt:341,s3Pt:-11,totalPt:330,ptg:-0.2,s3Games:51},
  '岡崎': {inheritPt:405,s3Pt:-98,totalPt:307,ptg:-1.5,s3Games:64},
  '大塚': {inheritPt:-1100,s3Pt:-614,totalPt:-1714,ptg:-10.1,s3Games:61},
  '矢嶋': {inheritPt:-314,s3Pt:-454,totalPt:-768,ptg:-11.9,s3Games:38},
  '本井': {inheritPt:-119,s3Pt:161,totalPt:42,ptg:7.3,s3Games:22}
};


const RANK_THRESHOLDS = [
  {min:4000,  max:null,  rank:'魂天', grade:'',  cls:'konten',  icon:'👑', barColor:'#ffd700'},
  {min:2667,  max:4000,  rank:'雀聖', grade:'Ⅲ', cls:'jusei',   icon:'🔱', barColor:'#c471ed'},
  {min:1833,  max:2667,  rank:'雀聖', grade:'Ⅱ', cls:'jusei',   icon:'🔱', barColor:'#c471ed'},
  {min:1500,  max:1833,  rank:'雀聖', grade:'Ⅰ', cls:'jusei',   icon:'🔱', barColor:'#c471ed'},
  {min:1000,  max:1500,  rank:'雀豪', grade:'Ⅲ', cls:'jugo',    icon:'⚡', barColor:'#42a5f5'},
  {min:500,   max:1000,  rank:'雀豪', grade:'Ⅱ', cls:'jugo',    icon:'⚡', barColor:'#42a5f5'},
  {min:0,     max:500,   rank:'雀豪', grade:'Ⅰ', cls:'jugo',    icon:'⚡', barColor:'#42a5f5'},
  {min:-500,  max:0,     rank:'雀傑', grade:'Ⅲ', cls:'juketsu', icon:'🌟', barColor:'#66bb6a'},
  {min:-1000, max:-500,  rank:'雀傑', grade:'Ⅱ', cls:'juketsu', icon:'🌟', barColor:'#66bb6a'},
  {min:-1500, max:-1000, rank:'雀傑', grade:'Ⅰ', cls:'juketsu', icon:'🌟', barColor:'#66bb6a'},
  {min:-2167, max:-1500, rank:'雀士', grade:'Ⅲ', cls:'jushi',   icon:'🌙', barColor:'#90a4ae'},
  {min:-2833, max:-2167, rank:'雀士', grade:'Ⅱ', cls:'jushi',   icon:'🌙', barColor:'#90a4ae'},
  {min:-3500, max:-2833, rank:'雀士', grade:'Ⅰ', cls:'jushi',   icon:'🌙', barColor:'#90a4ae'},
  {min:-4000, max:-3500, rank:'初心', grade:'Ⅲ', cls:'shoshin', icon:'🌱', barColor:'#bcaaa4'},
  {min:-4500, max:-4000, rank:'初心', grade:'Ⅱ', cls:'shoshin', icon:'🌱', barColor:'#bcaaa4'},
  {min:null,  max:-4500, rank:'初心', grade:'Ⅰ', cls:'shoshin', icon:'🌱', barColor:'#bcaaa4'},
];

function getRankInfo(pt){
  for(const t of RANK_THRESHOLDS){
    const aboveMin = t.min===null || pt >= t.min;
    const belowMax = t.max===null || pt < t.max;
    if(aboveMin && belowMax) return t;
  }
  return RANK_THRESHOLDS[RANK_THRESHOLDS.length-1];
}

function getNextRankInfo(t){
  const idx = RANK_THRESHOLDS.indexOf(t);
  return idx > 0 ? RANK_THRESHOLDS[idx-1] : null;
}

function buildRankBoard(){
  const order = ['土岐','矢嶋','藤木','松林','鹿山','岡崎','大塚','河井','本井'];
  const board = document.getElementById('rank-board');
  
  // WGランクPtで降順ソート
  const sorted = [...order].sort((a,b)=> RANK_DATA[b].totalPt - RANK_DATA[a].totalPt);
  
  sorted.forEach(m => {
    const rd = RANK_DATA[m];
    const t = getRankInfo(rd.totalPt);
    const next = getNextRankInfo(t);
    const color = COLORS[m] || '#666';
    
    // プログレスバー計算
    let barPct = 0;
    if(t.min !== null && t.max !== null){
      const range = t.max - t.min;
      barPct = Math.min(100, Math.max(0, ((rd.totalPt - t.min) / range) * 100));
    } else if(t.max === null){
      barPct = 100; // 魂天
    } else {
      barPct = 0;
    }

    // 次のランクまでの情報
    let nextInfo = '';
    if(!next){
      nextInfo = `<span class="good">👑 魂天達成！</span>`;
    } else {
      const needPt = next.min - rd.totalPt;
      const ptgAbs = Math.abs(rd.ptg);
      if(rd.ptg > 0){
        const gamesNeeded = Math.ceil(needPt / rd.ptg);
        nextInfo = `次の目標 <span class="highlight">${next.rank}${next.grade}</span> まで <span class="highlight">あと${needPt.toLocaleString()}pt</span><br>
        現在のペース（<span class="good">+${rd.ptg}/G</span>）→ 約<span class="highlight">${gamesNeeded}半荘</span>で昇格圏`;
      } else if(rd.ptg < 0){
        // 降格リスク
        const prev = RANK_THRESHOLDS[RANK_THRESHOLDS.indexOf(t)+1];
        if(prev){
          const dropPt = rd.totalPt - prev.max;
          const dropGames = Math.ceil(dropPt / ptgAbs);
          nextInfo = `<span class="warn">⚠ 降格リスク</span>：${prev.rank}${prev.grade}まで あと${dropPt.toLocaleString()}pt<br>
          現在のペース（<span class="warn">${rd.ptg}/G</span>）→ 約${dropGames}半荘で降格の可能性`;
        } else {
          nextInfo = `<span class="warn">⚠ 現在ペースマイナス（${rd.ptg}/G）</span>`;
        }
      } else {
        nextInfo = `次の目標 <span class="highlight">${next.rank}${next.grade}</span> まで <span class="highlight">あと${needPt.toLocaleString()}pt</span>`;
      }
    }

    board.innerHTML += `
    <div class="rank-card">
      <div class="rank-card-header">
        <span class="rank-badge ${t.cls}">${t.icon} ${t.rank}${t.grade}</span>
        <span class="rank-member" style="color:${color};">${dn(m)}</span>
      </div>
      <div class="rank-pt-row">
        <span>WGランクPt</span>
        <span class="rank-pt-val" style="color:${rd.totalPt>=0?'#1a7c3e':'#c00000'}">${rd.totalPt>=0?'+':''}${rd.totalPt.toLocaleString()}</span>
      </div>
      <div class="rank-pt-row" style="font-size:10px;color:#888;">
        <span>引継ぎ${rd.inheritPt>=0?'+':''}${rd.inheritPt} ／ S3 ${rd.s3Pt>=0?'+':''}${rd.s3Pt}（${rd.s3Games}半荘）</span>
        <span>ランクPt/G: <b style="color:${rd.ptg>=0?'#1a7c3e':'#c00000'}">${rd.ptg>=0?'+':''}${rd.ptg}</b></span>
      </div>
      <div class="rank-bar-wrap">
        <div class="rank-bar-fill" style="width:${barPct.toFixed(1)}%;background:${t.barColor};"></div>
      </div>
      <div class="rank-next">${nextInfo}</div>
    </div>`;
  });
}

function buildSummaryTable(){
  const ORDER = ['土岐','藤木','鹿山','河井','松林','岡崎','大塚','矢嶋','本井'];

  const S = {
    th_label: 'padding:5px 8px;border:1px solid #b0b0b0;background:#d9d9d9;font-weight:700;font-size:11px;text-align:left;white-space:nowrap;',
    th_member:'padding:5px 6px;border:1px solid #b0b0b0;background:#dce6f1;font-weight:700;font-size:11px;text-align:center;white-space:nowrap;',
    td_base:  'padding:4px 7px;border:1px solid #c8c8c8;text-align:center;white-space:nowrap;font-size:11px;',
    td_label: 'padding:4px 8px;border:1px solid #c8c8c8;font-weight:600;font-size:11px;white-space:nowrap;background:#f2f2f2;text-align:left;',
  };

  const thead = document.getElementById('summary-thead');
  let hRow = '<tr><th style="'+S.th_label+'">WGメンバー</th>';
  ORDER.forEach(m => { hRow += '<th style="'+S.th_member+'">'+dn(m)+'</th>'; });
  thead.innerHTML = hRow + '</tr>';

  const allData = ORDER.map(m => DATA.find(x=>x.name===m));
  const get = (key) => allData.map(d => d ? d[key] : 0);

  function getRank(val, arr, higherBetter){
    const sorted = [...new Set(arr)].sort((a,b)=> higherBetter ? b-a : a-b);
    return sorted.indexOf(val) + 1;
  }
  function arrowHtml(val, arr, higherBetter){
    const n = [...new Set(arr)].length;
    const r = getRank(val, arr, higherBetter);
    if(r===1) return '<span style="color:#1a7c3e;font-size:10px;margin-right:2px;">▲</span>';
    if(r===n) return '<span style="color:#c00000;font-size:10px;margin-right:2px;">▼</span>';
    return '<span style="color:#7f7f7f;font-size:10px;margin-right:2px;">➡</span>';
  }
  function blueBg(val, max, lightness){
    if(val===0) return 'background:#fff;';
    const l = Math.round(lightness - (val/Math.max(max,1))*30);
    return 'background:hsl(213,72%,'+l+'%);color:#fff;font-weight:600;';
  }
  function redBg(val, max){
    if(val===0) return 'background:#fff;';
    const l = Math.round(90 - (val/Math.max(max,1))*25);
    return 'background:hsl(0,70%,'+l+'%);color:#fff;font-weight:600;';
  }
  function ptsIcon(v){
    if(v>50)  return '<span style="color:#1a7c3e;">🍀</span> ';
    if(v>0)   return '<span style="color:#1a7c3e;">✅</span> ';
    if(v===0) return '<span style="color:#bf8f00;">❗</span> ';
    return '<span style="color:#c00000;">❌</span> ';
  }

  const rows = [
    { label:'半荘数', render:(d)=>{
      const arr=get('games'); const mx=Math.max(...arr);
      const bg=d.games===mx?'background:#fff2cc;font-weight:700;':'';
      return '<td style="'+S.td_base+bg+'">'+d.games+'</td>';
    }},
    { label:'平均順位', render:(d)=>{
      const arr=get('avgRank'); const r=getRank(d.avgRank,arr,false); const n=[...new Set(arr)].length;
      const bg=r===1?'background:#c6efce;':r===n?'background:#ffc7ce;':'';
      return '<td style="'+S.td_base+bg+'">'+d.avgRank.toFixed(2)+'</td>';
    }},
    { label:'1st', render:(d)=>{
      const arr=get('r1'); const mx=Math.max(...arr);
      return '<td style="'+S.td_base+blueBg(d.r1,mx,78)+'">'+d.r1+'回</td>';
    }},
    { label:'2nd', render:(d)=>{
      const arr=get('r2'); const mx=Math.max(...arr);
      return '<td style="'+S.td_base+blueBg(d.r2,mx,82)+'">'+d.r2+'回</td>';
    }},
    { label:'3rd', render:(d)=>{
      const arr=get('r3'); const mx=Math.max(...arr);
      return '<td style="'+S.td_base+blueBg(d.r3,mx,86)+'">'+d.r3+'回</td>';
    }},
    { label:'4th', render:(d)=>{
      const arr=get('r4'); const mx=Math.max(...arr);
      return '<td style="'+S.td_base+redBg(d.r4,mx)+'">'+d.r4+'回</td>';
    }},
    { label:'Top率', render:(d)=>{
      const arr=get('topRate');
      return '<td style="'+S.td_base+'">'+arrowHtml(d.topRate,arr,true)+d.topRate.toFixed(1)+'%</td>';
    }},
    { label:'連帯率', render:(d)=>{
      const arr=get('renRate');
      return '<td style="'+S.td_base+'">'+arrowHtml(d.renRate,arr,true)+d.renRate.toFixed(1)+'%</td>';
    }},
    { label:'4着回避率', render:(d)=>{
      const arr=get('avoidRate');
      return '<td style="'+S.td_base+'">'+arrowHtml(d.avoidRate,arr,true)+d.avoidRate.toFixed(1)+'%</td>';
    }},
    { label:'Max Pts', render:(d)=>{
      const col=d.maxPts>=0?'#1a7c3e':'#c00000';
      return '<td style="'+S.td_base+'color:'+col+';font-weight:600;">'+(d.maxPts>0?'+':'')+d.maxPts+' p</td>';
    }},
    { label:'Min Pts', render:(d)=>{
      const col=d.minPts>=0?'#1a7c3e':'#c00000';
      return '<td style="'+S.td_base+'color:'+col+';font-weight:600;">'+(d.minPts>0?'+':'')+d.minPts+' p</td>';
    }},
    { label:'累計 Pts', render:(d)=>{
      const col=d.totalPts>=0?'#1a7c3e':'#c00000';
      const bg=d.totalPts>=0?'background:#eff7ef;':'background:#fff0f0;';
      return '<td style="'+S.td_base+bg+'color:'+col+';font-weight:700;">'+ptsIcon(d.totalPts)+(d.totalPts>0?'+':'')+d.totalPts+' p</td>';
    }},
    { label:'Pts/G', render:(d)=>{
      const arr=get('ptsPerGame'); const col=d.ptsPerGame>=0?'#1a7c3e':'#c00000';
      return '<td style="'+S.td_base+'color:'+col+';">'+arrowHtml(d.ptsPerGame,arr,true)+(d.ptsPerGame>0?'+':'')+d.ptsPerGame.toFixed(1)+'</td>';
    }},
  ];

  const tbody = document.getElementById('summary-tbody');
  rows.forEach(row => {
    let html = '<tr><td style="'+S.td_label+'">'+row.label+'</td>';
    allData.forEach(d => { html += d ? row.render(d) : '<td style="'+S.td_base+'">-</td>'; });
    tbody.innerHTML += html + '</tr>';
  });
}
</script>
