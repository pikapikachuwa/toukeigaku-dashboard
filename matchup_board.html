const board=document.getElementById('board');
function starCls(s){return s.W>s.L?'s-win':(s.W<s.L?'s-lose':'s-even');}
function badge(all){ if(!all) return '<span class="badge b-even">—</span>';
  if(all.W>all.L) return '<span class="badge b-win">通算 勝ち越し</span>';
  if(all.W<all.L) return '<span class="badge b-lose">通算 負け越し</span>';
  return '<span class="badge b-even">通算 五分</span>';}
function row(label,d,hl){ const cl=hl?' class="now"':''; if(!d) return `<tr${cl}><td>${label}</td><td class="dash">—</td><td class="dash">—</td><td class="dash">—</td><td class="dash">—</td><td class="dash">—</td></tr>`;
  const wr=(d.W/d.m*100).toFixed(1);
  const avg=(d.avg>0?'+':'')+d.avg.toFixed(1);
  const sd=(d.sd>0?'+':'')+d.sd;
  return `<tr${cl}><td>${label}</td><td class="star s-win">${d.W}</td><td class="star s-lose">${d.L}</td><td>${wr}%</td><td>${avg}</td><td>${sd}</td></tr>`;}
function coPill(all){ if(!all) return '';
  const good=all.cor>=17;
  return `<span class="co-pill ${good?'co-good':'co-eat'}">${good?'🤝 名コンビ':'⚔ 食い合い'} 共浮${all.cor}%</span>`;}
MEMBER_ORDER.forEach(A=>{
  const sec=document.createElement('div');sec.className='msec';sec.id='sec-'+A;
  const c=COL[A];
  let html=`<div class="msec-head" style="background:${c}1a;border-color:${c};color:${c};"><span class="nm">${A}</span><span class="vs">vs 全員（今季／通算セット）</span></div>`;
  const sm=(typeof SUMMARY!=='undefined'&&SUMMARY[A])?SUMMARY[A]:null;
  if(sm) html+=`<div class="msec-sum">💬 <b style="color:${c};">${A}</b>は${sm}</div>`;
  html+=`<div class="cards">`;
  MEMBER_ORDER.filter(B=>B!==A).forEach(B=>{
    const p=MATCHUP_BOARD[A][B]; const bc=COL[B];
    const cmt=(COMMENTS[A]&&COMMENTS[A][B])?COMMENTS[A][B]:null;
    html+=`<div class="mc">
      <div class="mc-top"><span class="mc-vs" style="color:${bc};">vs ${B}</span>${badge(p.all)}</div>
      <table class="mt"><thead><tr><th></th><th>勝星</th><th>負星</th><th>勝率</th><th>平均</th><th>累積</th></tr></thead>
      <tbody>${row('通算',p.all)}${row('今季',p.s3,true)}</tbody></table>
      <div class="co"><i>居心地</i>${coPill(p.all)}</div>
      <div class="cmt ${cmt?'':'wait'}">${cmt?cmt:'（コメント準備中）'}</div>
    </div>`;
  });
  html+='</div>';sec.innerHTML=html;board.appendChild(sec);
});
// メンバーバー生成
const mb=document.getElementById('memberbar');
MEMBER_ORDER.forEach(A=>{
  const b=document.createElement('div');b.className='mbtn';b.textContent=A;
  b.style.borderColor=COL[A];b.style.color=COL[A];
  b.onclick=()=>document.getElementById('sec-'+A).scrollIntoView({behavior:'smooth'});

});
// sticky offset
function setOff(){const tb=document.querySelector('.topbar');const h=tb.offsetHeight+10;
  document.querySelectorAll('.msec').forEach(s=>s.style.scrollMarginTop=h+'px');}
setOff();window.addEventListener('resize',setOff);
