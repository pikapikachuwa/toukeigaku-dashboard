*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f5f7fa;color:#333;font-size:13px;}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.header-title{font-size:18px;font-weight:700;letter-spacing:1px;}

.dash-meta{font-size:12px;color:#aac;margin-left:10px;}
.season-tag{display:inline-block;background:#e8b84b;color:#222;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;margin-left:8px;}
.nav-btns{display:flex;gap:8px;flex-wrap:wrap;}
.nav-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;text-decoration:none;transition:background .2s;}
.nav-btn:hover{background:rgba(255,255,255,0.35);}
.container{max-width:1100px;margin:0 auto;padding:1rem;}
.medal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1rem;}
@media(max-width:600px){.medal-grid{grid-template-columns:1fr;}}
.medal-card{background:#fff;border-radius:12px;padding:1rem;text-align:center;border:2px solid #e0e0e0;}
.medal-card.gold{border-color:#f5c518;background:linear-gradient(135deg,#fffde7,#fff8e1);}
.medal-card.silver{border-color:#b0bec5;background:linear-gradient(135deg,#f5f5f5,#eceff1);}
.medal-card.bronze{border-color:#bf9270;background:linear-gradient(135deg,#fbe9e7,#fce4d6);}
.medal-icon{font-size:28px;}
.medal-name{font-size:16px;font-weight:700;margin:4px 0;}
.medal-pts{font-size:13px;color:#666;}
.chart-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.chart-title{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem;font-weight:700;font-size:14px;color:#333;}
.tab-btns{display:flex;flex-wrap:wrap;gap:4px;}
.tab-btn{background:#f0f0f0;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px;color:#555;}
.tab-btn.active{background:#4a90d9;color:#fff;}
.tbl-wrap{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;min-width:700px;font-size:11px;}
.tbl th{background:#f0f4f8;padding:6px 8px;border:1px solid #dde;text-align:center;font-weight:600;white-space:nowrap;}
.tbl td{padding:5px 8px;border:1px solid #eee;text-align:center;white-space:nowrap;}
.tbl tr:hover td{background:#f8faff;}
.tbl .left{text-align:left;}
.tbl .sep{border-left:2px solid #c0cfe0;}
.tbl .grp{font-size:10px;color:#888;background:#f8f8f8;}
.rank-1{color:#e8a000;font-weight:700;}
.rank-good{color:#27ae60;}
.rank-bad{color:#e74c3c;}
.s2-badge{display:inline-block;background:#dce6f1;color:#1a5276;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:3px;}
.s3-badge{display:inline-block;background:#d5f5e3;color:#1e8449;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:3px;}

// ---- MEDALS ----
function buildMedals(){
  const sorted=[...DATA].sort((a,b)=>b.totalPts-a.totalPts);
  const medals=[
    {cls:'gold',  icon:'🥇',rank:'1位'},
    {cls:'silver',icon:'🥈',rank:'2位'},
    {cls:'bronze',icon:'🥉',rank:'3位'},
  ];
  const grid=document.getElementById('medal-grid');
  medals.forEach((med,i)=>{
    const d=sorted[i];
    grid.innerHTML+=`<div class="medal-card ${med.cls}">
      <div class="medal-icon">${med.icon}</div>
      <div class="medal-name">${dn(d.name)}</div>
      <div class="medal-pts">通算 ${d.totalPts>0?'+':''}${d.totalPts} pts（${d.games}半荘）</div>
    </div>`;
  });
}

// ---- LINE CHART ----
function buildLineChart(){
  const ctx=document.getElementById('line-chart').getContext('2d');
  // X軸ラベル間引き（41日分→10本程度）
  const step=Math.ceil(TREND.length/10);
  new Chart(ctx,{
    type:'line',
    data:{
      labels:TREND.map(t=>t.date),
      datasets:MEMBER_ORDER.map(m=>{
        return {
          label:dn(m),
          data:TREND.map(t=>t[m]??null),
          borderColor:COLORS[m],
          backgroundColor:COLORS[m]+'22',
          borderWidth:2,
          pointRadius:0,
          pointHoverRadius:4,
          tension:0.3,
          spanGaps:true,
        };
      })
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}},tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{ticks:{maxTicksLimit:12,font:{size:10},maxRotation:45},grid:{display:false}},
        y:{ticks:{font:{size:10}},grid:{color:'#f0f0f0'}}
      }
    }
  });
}

// ---- BAR CHART ----
let barChart=null;
function switchBar(key,label,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('bar-label').textContent=label;
  const sorted=[...DATA].sort((a,b)=>key==='avgRank'?a[key]-b[key]:b[key]-a[key]);
  const ctx=document.getElementById('bar-chart').getContext('2d');
  if(barChart) barChart.destroy();
  barChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:sorted.map(d=>dn(d.name)),
      datasets:[{
        data:sorted.map(d=>d[key]),
        backgroundColor:sorted.map(d=>COLORS[d.name]+'cc'),
        borderColor:sorted.map(d=>COLORS[d.name]),
        borderWidth:1,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y}}},
      scales:{x:{ticks:{font:{size:11}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:'#f0f0f0'}}}
    }
  });
}

// ---- DETAIL TABLE ----
function renderTable(sortKey,btn){
  document.querySelectorAll('#detail-tbody').forEach(()=>{});
  const btns=document.querySelectorAll('.chart-card:last-child .tab-btn');
  btns.forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  let sorted;
  if(sortKey==='member') sorted=[...DATA].sort((a,b)=>MEMBER_ORDER.indexOf(a.name)-MEMBER_ORDER.indexOf(b.name));
  else if(sortKey==='avgRank') sorted=[...DATA].sort((a,b)=>a[sortKey]-b[sortKey]);
  else sorted=[...DATA].sort((a,b)=>b[sortKey]-a[sortKey]);
  const tbody=document.getElementById('detail-tbody');
  tbody.innerHTML='';
  sorted.forEach((d,i)=>{
    const dr=DETAIL_RANKS[d.name]||{};
    function rc(rank){return rank===1?'rank-1':rank<=3?'rank-good':rank>=8?'rank-bad':'';}
    const ptsCls=d.totalPts>0?'rank-good':d.totalPts<0?'rank-bad':'';
    const pgCls=d.ptsPerGame>0?'rank-good':d.ptsPerGame<0?'rank-bad':'';
    const a1=d.avgPts1st!==null?d.avgPts1st.toFixed(1):'-';
    const a4=d.avgPts4th!==null?d.avgPts4th.toFixed(1):'-';
    tbody.innerHTML+=`<tr>
      <td class="center" style="font-weight:700;">${i+1}</td>
      <td class="left" style="font-weight:700;color:${COLORS[d.name]};">${dn(d.name)}</td>
      <td class="sep ${rc(dr.games)}">${d.games}</td>
      <td class="${rc(dr.avgRank)}">${d.avgRank.toFixed(2)}</td>
      <td class="sep ${rc(dr.topRate)}">${d.topRate.toFixed(1)}%</td>
      <td class="${rc(dr.renRate)}">${d.renRate.toFixed(1)}%</td>
      <td class="${rc(dr.avoidRate)}">${d.avoidRate.toFixed(1)}%</td>
      <td class="${rc(9-dr.avoidRate+1)}">${d.lastRate.toFixed(1)}%</td>
      <td class="${rc(dr.plusRate)}">${d.plusRate.toFixed(1)}%</td>
      <td class="sep ${rc(dr.stdDev)}">${d.stdDev.toFixed(1)}</td>
      <td class="${rc(dr.avgPts1st)}">${a1}</td>
      <td>${a4}</td>
      <td class="sep">${d.recent30AvgRank.toFixed(2)}</td>
      <td class="sep ${ptsCls}" style="font-weight:700;">${d.totalPts>0?'+':''}${d.totalPts}</td>
      <td class="${pgCls}">${d.ptsPerGame>0?'+':''}${d.ptsPerGame.toFixed(1)}</td>
      <td style="color:#1a7c3e;">${d.maxPts>0?'+':''}${d.maxPts}</td>
      <td style="color:#c00000;">${d.minPts}</td>
      <td class="sep">${d.r1}</td><td>${d.r2}</td><td>${d.r3}</td><td>${d.r4}</td>
    </tr>`;
  });
}

// ---- SUMMARY TABLE ----
function buildSummaryTable(){
  const ORDER=['土岐','藤木','鹿山','河井','松林','岡崎','大塚','矢嶋','本井'];
  const S={
    th_label:'padding:5px 8px;border:1px solid #b0b0b0;background:#d9d9d9;font-weight:700;font-size:11px;text-align:left;white-space:nowrap;',
    th_member:'padding:5px 6px;border:1px solid #b0b0b0;background:#dce6f1;font-weight:700;font-size:11px;text-align:center;white-space:nowrap;',
    td_base:'padding:4px 7px;border:1px solid #c8c8c8;text-align:center;white-space:nowrap;font-size:11px;',
    td_label:'padding:4px 8px;border:1px solid #c8c8c8;font-weight:600;font-size:11px;white-space:nowrap;background:#f2f2f2;text-align:left;',
  };
  const thead=document.getElementById('summary-thead');
  let hRow='<tr><th style="'+S.th_label+'">WGメンバー</th>';
  ORDER.forEach(m=>{ hRow+='<th style="'+S.th_member+'">'+dn(m)+'</th>'; });
  thead.innerHTML=hRow+'</tr>';
  const allData=ORDER.map(m=>DATA.find(x=>x.name===m));
  const get=(key)=>allData.map(d=>d?d[key]:0);
  function getRank(val,arr,hb){
    const s=[...new Set(arr)].sort((a,b)=>hb?b-a:a-b);
    return s.indexOf(val)+1;
  }
  function arrowHtml(val,arr,hb){
    const n=[...new Set(arr)].length,r=getRank(val,arr,hb);
    if(r===1) return '<span style="color:#1a7c3e;font-size:10px;margin-right:2px;">▲</span>';
    if(r===n) return '<span style="color:#c00000;font-size:10px;margin-right:2px;">▼</span>';
    return '<span style="color:#7f7f7f;font-size:10px;margin-right:2px;">➡</span>';
  }
  function blueBg(val,max,l){
    if(val===0) return 'background:#fff;';
    const lv=Math.round(l-(val/Math.max(max,1))*30);
    return 'background:hsl(213,72%,'+lv+'%);color:#fff;font-weight:600;';
  }
  function redBg(val,max){
    if(val===0) return 'background:#fff;';
    const lv=Math.round(90-(val/Math.max(max,1))*25);
    return 'background:hsl(0,70%,'+lv+'%);color:#fff;font-weight:600;';
  }
  function ptsIcon(v){
    if(v>100) return '<span style="color:#1a7c3e;">🍀</span> ';
    if(v>0)   return '<span style="color:#1a7c3e;">✅</span> ';
    if(v===0) return '<span style="color:#bf8f00;">❗</span> ';
    return '<span style="color:#c00000;">❌</span> ';
  }
  const rows=[
    {label:'半荘数',render:(d)=>{
      const arr=get('games'),mx=Math.max(...arr);
      return '<td style="'+S.td_base+(d.games===mx?'background:#fff2cc;font-weight:700;':'')+'">'+d.games+'</td>';
    }},
    {label:'平均順位',render:(d)=>{
      const arr=get('avgRank'),r=getRank(d.avgRank,arr,false),n=[...new Set(arr)].length;
      return '<td style="'+S.td_base+(r===1?'background:#c6efce;':r===n?'background:#ffc7ce;':'')+'">'+d.avgRank.toFixed(2)+'</td>';
    }},
    {label:'1st',render:(d)=>{const arr=get('r1'),mx=Math.max(...arr);return '<td style="'+S.td_base+blueBg(d.r1,mx,78)+'">'+d.r1+'回</td>';}},
    {label:'2nd',render:(d)=>{const arr=get('r2'),mx=Math.max(...arr);return '<td style="'+S.td_base+blueBg(d.r2,mx,82)+'">'+d.r2+'回</td>';}},
    {label:'3rd',render:(d)=>{const arr=get('r3'),mx=Math.max(...arr);return '<td style="'+S.td_base+blueBg(d.r3,mx,86)+'">'+d.r3+'回</td>';}},
    {label:'4th',render:(d)=>{const arr=get('r4'),mx=Math.max(...arr);return '<td style="'+S.td_base+redBg(d.r4,mx)+'">'+d.r4+'回</td>';}},
    {label:'Top率',render:(d)=>{const arr=get('topRate');return '<td style="'+S.td_base+'">'+arrowHtml(d.topRate,arr,true)+d.topRate.toFixed(1)+'%</td>';}},
    {label:'連帯率',render:(d)=>{const arr=get('renRate');return '<td style="'+S.td_base+'">'+arrowHtml(d.renRate,arr,true)+d.renRate.toFixed(1)+'%</td>';}},
    {label:'4着回避率',render:(d)=>{const arr=get('avoidRate');return '<td style="'+S.td_base+'">'+arrowHtml(d.avoidRate,arr,true)+d.avoidRate.toFixed(1)+'%</td>';}},
    {label:'Max Pts',render:(d)=>{const col=d.maxPts>=0?'#1a7c3e':'#c00000';return '<td style="'+S.td_base+'color:'+col+';font-weight:600;">'+(d.maxPts>0?'+':'')+d.maxPts+' p</td>';}},
    {label:'Min Pts',render:(d)=>{const col=d.minPts>=0?'#1a7c3e':'#c00000';return '<td style="'+S.td_base+'color:'+col+';font-weight:600;">'+(d.minPts>0?'+':'')+d.minPts+' p</td>';}},
    {label:'累計 Pts',render:(d)=>{
      const col=d.totalPts>=0?'#1a7c3e':'#c00000',bg=d.totalPts>=0?'background:#eff7ef;':'background:#fff0f0;';
      return '<td style="'+S.td_base+bg+'color:'+col+';font-weight:700;">'+ptsIcon(d.totalPts)+(d.totalPts>0?'+':'')+d.totalPts+' p</td>';
    }},
    {label:'Pts/G',render:(d)=>{const arr=get('ptsPerGame'),col=d.ptsPerGame>=0?'#1a7c3e':'#c00000';return '<td style="'+S.td_base+'color:'+col+';">'+arrowHtml(d.ptsPerGame,arr,true)+(d.ptsPerGame>0?'+':'')+d.ptsPerGame.toFixed(1)+'</td>';}},
  ];
  const tbody=document.getElementById('summary-tbody');
  rows.forEach(row=>{
    let html='<tr><td style="'+S.td_label+'">'+row.label+'</td>';
    allData.forEach(d=>{ html+=d?row.render(d):'<td style="'+S.td_base+'">-</td>'; });
    tbody.innerHTML+=html+'</tr>';
  });
}

buildMedals();
buildLineChart();
renderTable('totalPts',null);
switchBar('totalPts','累計Pts比較',document.querySelector('.tab-btn.active'));
buildSummaryTable();
