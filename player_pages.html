function r2s(r){ return Math.round((N-r)/(N-1)*100); }
function ps(n){ return n==null?'-':(n>0?'+':'')+n; }
function f1(n){ return n==null?'-':Number(n).toFixed(1); }
function f2(n){ return n==null?'-':Number(n).toFixed(2); }
function pct(n){ return n==null?'-':f1(n)+'%'; }
function pc(n){ return n>0?'pos':n<0?'neg':''; }

function grade(avg){
  if(avg==null) return null;
  if(avg>=10)  return {label:'超得意！',cls:'gA'};

    hitokoto:'🎲 スコアの振れ幅、もはや天気予報レベル。晴れの日は最高だけど、荒れる日は本当に荒れる。でもそのジェットコースター感がなぜか憎めない。矢嶋との相性+51.1という数字は本物の武器。標準偏差をもう少し「統計学的」に管理できたら、このWGの台風の目になれる逸材。'},
  '矢嶋':{type:'🎭 激増の個性派プレイヤー',color:'#c0392b',initials:'矢',
    strong:'藤木との補正差分+110.0はWG内でダントツ最高の相性。土岐とも+6.4と互角以上。今日の活動日でゲーム数が12→20に急増。',
    weak:'大塚との補正差分-51.1、鹿山との-52.8はいずれも「超苦手！」評価。今日の活動日は苦戦し累計が大幅にマイナス（-91→-287）。Pts/G-14.3はWG下位圏。',
    trend:'今日の活動日で大きくマイナスを増やした。苦手な相手に当たる機会が多かったか。',
    hitokoto:'🎭 今日は天敵（大塚・鹿山）に苦しめられたか、累計が-196も悪化。しかし藤木との相性+110というWG最強の化学反応は健在。「今日の卓メン誰？」が最重要事項のプレイヤー。次回は相性の良い相手と同卓して巻き返しを狙え！'},
  '本井':{type:'🛡️ 守備の達人・1着時得点力WG1位',color:'#f39c12',initials:'本',
    strong:'4着回避率84.6%はWG2位という驚異的な守備力。1着時の平均得点+77.0はWG1位という意外な攻撃力も持つ。藤木との補正差分+87.3も高相性。',
    weak:'土岐との補正差分-55.8、矢嶋との-22.7と天敵が複数。プラス率23.1%はWG最低水準で、勝ちにつなげる試合が少ない。',
    trend:'直近20戦も全体と同水準で大きな変化なし。',
    hitokoto:'🛡️ 4着回避率2位・1着時得点力1位という矛盾した魅力の持ち主。守りながら、いざ1位を取ると一番点を稼ぐ。しかし土岐・矢嶋という天敵との相性が壁になっている。プラス率23.1%という数字を上げることが次のステージへの鍵。'},
};

const PTS_RANK = {'土岐':1,'藤木':7,'鹿山':4,'河井':9,'松林':2,'岡崎':6,'大塚':3,'矢嶋':8,'本井':5};

let radarCharts = {};

function buildPage(name){
  const d = DATA[name];
  const p = PROFILES[name];
  const dr = DETAIL_RANKS[name];
  const rr = RADAR_RANKS[name];
  const mu = MATCHUP[name]||{};
  const ptsRank = PTS_RANK[name];

  const ptsVal = ps(d.totalPts);
  const ppgVal = ps(f1(d.ptsPerGame));

  let detailRows = [
    ['連帯率',     pct(d.renRate),   'WG '+dr.renRate+'位'],
    ['4着回避率',  pct(d.avoidRate), 'WG '+dr.avoidRate+'位'],
    ['ラス率',     pct(d.lastRate),  'WG '+(10-dr.avoidRate)+'位'],
    ['プラス率',   pct(d.plusRate),  'WG '+dr.plusRate+'位'],
    ['標準偏差',   f1(d.stdDev),     'WG '+dr.stdDev+'位'],
    ['1着時Pts',   d.avgPts1st!=null?ps(f1(d.avgPts1st)):'-', d.avgPts1st!=null?'WG '+dr.avgPts1st+'位':'－'],
    ['4着時Pts',   ps(f1(d.avgPts4th)), ''],
    ['MaxPts',     ps(d.maxPts),     ''],
    ['直近20戦順位', f2(d.recent20AvgRank), d.recent20AvgRank>d.avgRank?'↓ やや低下':d.recent20AvgRank<d.avgRank?'↑ 上昇中':'→ 横ばい'],
  ];

  const detailHTML = detailRows.map(([label,val,rank])=>`
    <tr><td style="color:#888;padding:5px 0;border-bottom:1px solid #f5f5f5;">${label}</td>
    <td style="text-align:right;font-weight:600;padding:5px 0;border-bottom:1px solid #f5f5f5;">${val}</td>
    <td style="text-align:right;font-size:10px;color:#aaa;padding:5px 0 5px 6px;border-bottom:1px solid #f5f5f5;">${rank}</td></tr>
  `).join('');

  const matchupOrder = ALL_MEMBERS.filter(m=>m!==name);
  const matchupHTML = matchupOrder.map(opp=>{
    const m = mu[opp];
    const g = m ? grade(m[1]) : null;
    return `<div class="mc ${g?g.cls:'gN'}">
      <div class="mc-name">${dn(opp)}</div>
      <div class="mc-grade">${g?g.label:'－'}</div>
      <div class="mc-detail">${m?m[1].toFixed(1)+' / '+m[0]+'回':'同卓なし'}</div>
    </div>`;
  }).join('');

  return `
  <div class="hero">
    <div class="avatar" style="background:${p.color}22;color:${p.color};">${p.initials}</div>
    <div style="flex:1;">
      <div class="hero-name" style="color:${p.color};">${dn(name)}</div>
      <div class="type-badge">${p.type}</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:#aaa;">参加半荘数</div>
      <div style="font-size:24px;font-weight:700;color:#333;">${d.games}</div>
      <div style="font-size:10px;color:#aaa;">WG ${dr.games}位</div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">累計Pts</div>
      <div class="metric-val ${pc(d.totalPts)}">${ptsVal}</div>
      <div class="metric-rank">WG ${ptsRank}位</div>
    </div>
    <div class="metric">
      <div class="metric-label">Pts/G</div>
      <div class="metric-val ${pc(d.ptsPerGame)}">${ppgVal}</div>
      <div class="metric-rank">WG ${dr.ptsPerGame}位</div>
    </div>
    <div class="metric">
      <div class="metric-label">Top率</div>
      <div class="metric-val">${pct(d.topRate)}</div>
      <div class="metric-rank">WG ${dr.topRate}位</div>
    </div>
    <div class="metric">
      <div class="metric-label">平均順位</div>
      <div class="metric-val">${f2(d.avgRank)}</div>
      <div class="metric-rank">WG ${dr.avgRank}位</div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title">📡 能力レーダー</div>
      <div style="height:220px;position:relative;">
        <canvas id="radar-${name}" role="img" aria-label="${name}の能力レーダーチャート">${name}の能力レーダー</canvas>
      </div>
      <div class="radar-note">※ WG内順位をスコア化（1位=100、9位=0）</div>
    </div>
    <div class="card">
      <div class="card-title">📊 詳細指標</div>
      <table class="detail-tbl">${detailHTML}</table>
    </div>
  </div>

  <div class="card" style="margin-bottom:1rem;">
    <div class="card-title">🔍 データ分析</div>
    <div class="analysis-block">
      <div class="analysis-label">📈 強み</div>
      <div class="analysis-text">${p.strong}</div>
    </div>
    <div class="analysis-block">
      <div class="analysis-label">⚠️ 課題</div>
      <div class="analysis-text">${p.weak}</div>
    </div>
    <div class="analysis-block" style="margin-bottom:0;">
      <div class="analysis-label">📉 直近の傾向</div>
      <div class="analysis-text">${p.trend}</div>
    </div>
  </div>

  <div class="hitokoto">
    <div class="hitokoto-title">🤖 AIからヒトコト</div>
    <div class="hitokoto-text">${p.hitokoto}</div>
  </div>

  <div class="card">
    <div class="card-title">🀄 同卓分析</div>
    <p style="font-size:11px;color:#aaa;margin-bottom:12px;">各メンバーと同卓した半荘での補正済み平均差分をもとに相性を評価（全体的な強さの影響を除外）</p>
    <div class="matchup-grid">${matchupHTML}</div>
    <div class="legend">
      <span class="gA">超得意！（+10以上）</span>
      <span class="gB">得意！（+3〜+10）</span>
      <span class="gC">普通～（-3〜+3）</span>
      <span class="gD">苦手！（-10〜-3）</span>
      <span class="gE">超苦手！（-10未満）</span>
    </div>
  </div>`;
}

function buildRadar(name){
  if(radarCharts[name]){ radarCharts[name].destroy(); }
  const rr = RADAR_RANKS[name];
  const p = PROFILES[name];
  const avgScore = r2s(5);
  const ctx = document.getElementById('radar-'+name);
  if(!ctx) return;
  radarCharts[name] = new Chart(ctx.getContext('2d'),{
    type:'radar',
    data:{
      labels:['Top率','連帯率','4着回避率','プラス率','安定性','得点力'],
      datasets:[
        {label:dn(name),data:rr.map(r=>r2s(r)),borderColor:p.color,backgroundColor:p.color+'26',borderWidth:2,pointBackgroundColor:p.color,pointRadius:4},
        {label:'WG平均',data:[avgScore,avgScore,avgScore,avgScore,avgScore,avgScore],borderColor:'#ccc',backgroundColor:'rgba(200,200,200,0.08)',borderWidth:1.5,pointBackgroundColor:'#ccc',pointRadius:3,borderDash:[4,3]}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12,padding:8}},
        tooltip:{callbacks:{label:ctx=>{const r=Math.round(N-ctx.raw*(N-1)/100);return ctx.dataset.label+': WG '+r+'位相当';}}}},
      scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:9},color:'#bbb',backdropColor:'transparent',callback:v=>v===0?'9位':v===50?'5位':v===100?'1位':''},grid:{color:'rgba(0,0,0,0.06)'},pointLabels:{font:{size:11}}}}
    }
  });
}

let currentPage = '';
function showPage(name){
  if(currentPage === name) return;
  currentPage = name;
  document.querySelectorAll('.nav a[id^="nav-"]').forEach(a=>a.classList.remove('active'));
  const navEl = document.getElementById('nav-'+name);
  if(navEl) navEl.classList.add('active');
  const container = document.getElementById('main-container');
  container.innerHTML = buildPage(name);
  setTimeout(()=>buildRadar(name), 100);
}

showPage('土岐');
</script>
</body>
</html>
