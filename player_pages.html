function r2s(r){return Math.round((N-r)/(N-1)*100);}
function ps(n){return n==null?'-':(n>0?'+':'')+n;}
function f1(n){return n==null?'-':Number(n).toFixed(1);}
function f2(n){return n==null?'-':Number(n).toFixed(2);}
function pct(n){return n==null?'-':f1(n)+'%';}
function pc(n){return n>0?'pos':n<0?'neg':'';}
function rk(n){
  if(n==null) return '';
  const t=Math.min(4,Math.max(1,Math.ceil(n/N*4)));  // 25%刻みのティア（1=上位25%, 4=下位25%）。人数Nに自動追従
  if(t===2||t===3) return `<span style="font-size:10px;font-weight:500;color:#888;">WG${n}位</span>`;  // 中間ティアⅡ・Ⅲ：無色
  const top=(t===1);
  const bg=top?'#d9f0e1':'#f9ddd8', c=top?'#1b7a32':'#b5352a';   // Ⅰ=緑 / Ⅳ=赤
  return `<span style="display:inline-block;padding:1px 8px;border-radius:999px;background:${bg};color:${c};font-size:10px;font-weight:700;line-height:1.7;">WG${n}位</span>`;
}
function volType(sd,m,data){
  // 振れ幅をサンプル数で縮約（k=10）→ WG平均からの距離で5段に分類。少サンプルは△
  const sds=Object.values(data).filter(o=>o.games>0).map(o=>o.stdDev);
  const mean=sds.reduce((a,b)=>a+b,0)/sds.length;
  const k=10, shrunk=mean+(sd-mean)*m/(m+k), dev=shrunk-mean;
  let label;
  if(dev<=-4)        label='🛡️ 鉄壁型';
  else if(dev<=-2.5) label='🎯 堅実型';
  else if(dev<2.5)   label='⚖️ 普通型';
  else if(dev<4)     label='⚡ 強気型';
  else               label='🎢 一発型';
  if(m<15) label+=' △';
  return `<span style="font-size:10px;font-weight:500;color:#888;">${label}</span>`;
}
function grade(v){
  if(v>=10) return {label:'超得意！',cls:'gA'};

function buildMatchup(mu,label,name){
  const MEMBER_COLORS = {
    '土岐':'#4a90d9','藤木':'#e67e22','鹿山':'#95a5a6',
    '河井':'#f1c40f','松林':'#9b59b6','岡崎':'#27ae60',
    '大塚':'#c0392b','矢嶋':'#e74c3c','本井':'#1abc9c'
  };
  const scope = label.includes('最新') ? 's3' : 'all';
  const rows=ALL_MEMBERS.filter(opp=>opp!==name).map(opp=>{
    if(!mu[opp]) return `<div class="mc gN"><div class="mc-name">${dn(opp)}</div><div class="mc-grade">同卓なし</div><div class="mc-detail"></div></div>`;
    const [g,wr,rp]=mu[opp];
    const flag=g<=3?' <span style="font-size:9px;color:#aaa;">△要観察</span>':'';    const rpCls=rp>=10?'gA':rp>=3?'gB':rp>=-3?'gC':rp>=-10?'gD':'gE';
    const rpStr=rp>=0?`+${rp.toFixed(1)}`:`${rp.toFixed(1)}`;
    const wrStr=wr.toFixed(1);
    const oppColor = MEMBER_COLORS[opp] || '#888';
    return `<div class="mc ${rpCls}"><div class="mc-name" style="color:${oppColor};font-weight:700;">${dn(opp)}${flag}</div><div class="mc-grade">相対 ${rpStr}pt</div><div class="mc-detail">上回り率 ${wrStr}% / ${g}戦</div></div>`;
  });

  // AIコメント：得意(rp>=3)と苦手(rp<=-3)と普通で分類
  const commentData = (MATCHUP_COMMENTS[name] && MATCHUP_COMMENTS[name][scope]) || {};
  const oppList = ALL_MEMBERS.filter(opp=>opp!==name && mu[opp] && commentData[opp]);
  const liked = oppList.filter(opp=>mu[opp][2]>=3).sort((a,b)=>mu[b][2]-mu[a][2]);

  const disliked = oppList.filter(opp=>mu[opp][2]<=-3).sort((a,b)=>mu[a][2]-mu[b][2]);

  function renderCommentGroup(members, groupLabel, groupColor) {
    if(!members.length) return '';
    const items = members.map(opp=>{
      const oppColor = MEMBER_COLORS[opp] || '#888';
      return `<li style="margin-bottom:8px;padding:6px 8px;background:#f9f9f9;border-radius:6px;border-left:3px solid ${oppColor};">

      <ul style="list-style:none;padding:0;">${items}</ul>
    </div>`;
  }

  const aiContent = [
    renderCommentGroup(liked, '😊 調子が上がる相手', '#2e7d32'),

  ].join('');

  const aiComment = aiContent ? `

  return `<div class="card" style="margin-bottom:0.75rem;">

  return `

}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav a').forEach(a=>{if(a.textContent===dn(name))a.classList.add('active');});
  drawRadar(name);
  drawMap(name);
  drawChoshi(name);
}

let drawn={};
function drawRadar(name){
  if(drawn[name])return;
  drawn[name]=true;
  const canvas=document.getElementById('radar-'+name);
  if(!canvas)return;
  // Retina/高DPIディスプレイ対応
  const dpr=window.devicePixelRatio||1;
  const dispW=200,dispH=175;
  canvas.width=dispW*dpr;
  canvas.height=dispH*dpr;
  canvas.style.width=dispW+'px';
  canvas.style.height=dispH+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const rr=RADAR_RANKS[name],p=PROFILES[name];
  const labels=['Top率','連帯率','4着\n回避','プラス率','安定性','得点力'];
  const scores=rr.map(r=>r2s(r));
  const W=dispW,H=dispH,cx=W/2,cy=H/2-5,R=Math.min(W,H)*0.32,n=6;
  ctx.clearRect(0,0,W,H);
  for(let lv=1;lv<=4;lv++){
    ctx.beginPath();
    for(let i=0;i<n;i++){const a=Math.PI/2+i*2*Math.PI/n,r=R*lv/4;i===0?ctx.moveTo(cx+r*Math.cos(-a),cy-r*Math.sin(-a)):ctx.lineTo(cx+r*Math.cos(-a),cy-r*Math.sin(-a));}
    ctx.closePath();ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;ctx.stroke();
  }
  for(let i=0;i<n;i++){const a=Math.PI/2+i*2*Math.PI/n;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(-a),cy-R*Math.sin(-a));ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();
  for(let i=0;i<n;i++){const a=Math.PI/2+i*2*Math.PI/n,r=R*scores[i]/100;i===0?ctx.moveTo(cx+r*Math.cos(-a),cy-r*Math.sin(-a)):ctx.lineTo(cx+r*Math.cos(-a),cy-r*Math.sin(-a));}
  ctx.closePath();ctx.fillStyle=p.color+'33';ctx.fill();ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#555';ctx.font='10px Arial';ctx.textAlign='center';
  for(let i=0;i<n;i++){const a=Math.PI/2+i*2*Math.PI/n,r=R+16,lx=cx+r*Math.cos(-a),ly=cy-r*Math.sin(-a);const ls=labels[i].split('\n');ls.forEach((l,li)=>ctx.fillText(l,lx,ly+li*12-(ls.length-1)*6));}
}

const apx=a=>A_CX+a*A_SC, apy=d=>A_CY-d*A_SC;
let mapMode='ALL', amAnimId=null;
const mapMounted={};

      <text x="90"  y="293" text-anchor="middle" font-size="12.5" font-weight="700" fill="#76766a">📒 修行中(養分)</text>
      <!-- 軸ラベル（強調・ピル付き）-->

      <text x="85" y="25.5" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3a3a3a">守備寄与 ↑</text>
      <rect x="270" y="310" width="70" height="19" rx="9.5" fill="#fff" stroke="#d8d8cf"/>
      <text x="305" y="323.5" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3a3a3a">攻撃寄与 →</text>

    <details class="am-logic">
      <summary>📐 算定ロジックについては、こちらをタップ</summary>
      <p>各メンバーが「<b>攻め（大きく勝つ）</b>」と「<b>守り（浅く負ける）</b>」のどちらでWG平均より稼いでいるかを、1ゲームあたりの<b>素点（半荘スコア）</b>で分解。横軸＝攻撃寄与、縦軸＝守備寄与。色付きの大きい点がこのページの人です。</p>
      <div class="am-formula">攻撃寄与 ＝ 自分の平均ゲイン − WG平均ゲイン<br>守備寄与 ＝ 自分の平均ロス − WG平均ロス<br><span style="color:#888;">※ゲイン＝プラスのスコアだけ／ロス＝マイナスのスコアだけを全試合で平均</span></div>

function amEnsureDots(g){
  if(g._d) return g._d;
  const d={};
  ALL_MEMBERS.forEach(k=>{
    const c=document.createElementNS(NSV,'circle');c.setAttribute('r','5');c.setAttribute('fill',PROFILES[k].color);c.setAttribute('stroke','#fff');c.setAttribute('stroke-width','1.2');
    const t=document.createElementNS(NSV,'text');t.setAttribute('font-size','10.5');t.setAttribute('font-weight','600');t.setAttribute('fill',PROFILES[k].color);t.setAttribute('paint-order','stroke');t.setAttribute('stroke','#fff');t.setAttribute('stroke-width','3');t.textContent=dn(k);
    g.appendChild(c);g.appendChild(t);d[k]={c,t};
  });
  g._d=d;return d;
}
function amPlace(d,k,x,y,sel,dim){
  const c=d[k].c,t=d[k].t;
  c.setAttribute('cx',x.toFixed(1));c.setAttribute('cy',y.toFixed(1));
  c.setAttribute('r',sel?'8':'5');c.setAttribute('stroke',sel?'#222':'#fff');c.setAttribute('stroke-width',sel?'2':'1.2');c.setAttribute('opacity',dim?'0.4':'1');
  t.setAttribute('x',(x+(sel?10:8)).toFixed(1));t.setAttribute('y',(y-7).toFixed(1));t.setAttribute('font-size',sel?'12.5':'10.5');t.setAttribute('font-weight',sel?'700':'600');t.setAttribute('opacity',dim?'0.45':'1');
}
function amLabels(d,mode){ ALL_MEMBERS.forEach(k=>{ d[k].t.textContent = AG[mode][k]<15 ? dn(k)+' △' : dn(k); }); }
function amModeUI(card,mode){
  card.querySelector('.am-btn-all').classList.toggle('active',mode==='ALL');
  card.querySelector('.am-btn-s3').classList.toggle('active',mode==='S3');
  const cap=card.querySelector('.am-modecap');
  cap.className='am-modecap '+(mode==='ALL'?'m-all':'m-s3');
  cap.textContent = mode==='ALL' ? '通算：290戦' : '最新Season：84戦';
}
function amStatic(card,name,mode){
  const g=card.querySelector('.am-dots'),d=amEnsureDots(g);
  amLabels(d,mode);
  ALL_MEMBERS.forEach(k=>{const sel=k===name;amPlace(d,k,apx(AC[mode][k][0]),apy(AC[mode][k][1]),sel,!sel);});
}
function amAnimate(card,name,toMode){
  const g=card.querySelector('.am-dots'),d=amEnsureDots(g),fromMode=toMode==='ALL'?'S3':'ALL';
  amLabels(d,toMode);
  const t0=performance.now(),dur=500;
  if(amAnimId)cancelAnimationFrame(amAnimId);
  function frame(t){
    let p=Math.min(1,(t-t0)/dur),e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    ALL_MEMBERS.forEach(k=>{
      const x=apx(AC[fromMode][k][0])+(apx(AC[toMode][k][0])-apx(AC[fromMode][k][0]))*e;
      const y=apy(AC[fromMode][k][1])+(apy(AC[toMode][k][1])-apy(AC[fromMode][k][1]))*e;
      amPlace(d,k,x,y,k===name,k!==name);
    });
    if(p<1)amAnimId=requestAnimationFrame(frame);
  }
  amAnimId=requestAnimationFrame(frame);
}
function drawMap(name){
  const mount=document.getElementById('am-mount-'+name);
  if(!mount)return;
  if(!mapMounted[name]){
    mount.innerHTML=mapCardHTML();
    const card=mount.querySelector('.am-card');
    card.addEventListener('click',function(ev){
      if(ev.target.closest('.am-logic'))return;
      mapMode=mapMode==='ALL'?'S3':'ALL';
      amModeUI(card,mapMode);
      amAnimate(card,name,mapMode);
    });
    mapMounted[name]=card;
  }
  const card=mapMounted[name];
  amModeUI(card,mapMode);
  amStatic(card,name,mapMode);
}
