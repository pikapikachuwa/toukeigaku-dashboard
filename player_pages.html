<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統計学WG｜個人ページ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;background:#f5f5f0;color:#222;min-height:100vh;}
.nav{background:#fff;border-bottom:1px solid #e0e0e0;padding:0.75rem 1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.nav-title{font-size:14px;font-weight:600;color:#555;margin-right:8px;white-space:nowrap;}
.nav a{font-size:13px;color:#666;text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid #ddd;white-space:nowrap;}
.nav a:hover{background:#f5f5f5;}
.nav a.active{background:#333;color:#fff;border-color:#333;}
.nav-back{font-size:13px;color:#4a90d9;text-decoration:none;margin-right:8px;}
.container{max-width:960px;margin:0 auto;padding:1.5rem;}
.page{display:none;}
.page.active{display:block;}
.hero{display:flex;align-items:center;gap:16px;padding:1.25rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;margin-bottom:1rem;}
.avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0;}
.hero-name{font-size:22px;font-weight:700;margin-bottom:4px;}
.type-badge{display:inline-block;background:#fff8e1;color:#e65100;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #ffe082;}
.section-block{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
.section-block.s3{border-top:3px solid #4a90d9;}
.section-block.all{border-top:3px solid #f39c12;}
.section-label{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:0.85rem;}
.section-label.s3{background:#e8f4fd;color:#1565c0;border:1px solid #bbdefb;}
.section-label.all{background:#fff8e1;color:#e65100;border:1px solid #ffe082;}
.metrics5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem;}
.metrics3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
@media(max-width:640px){.metrics5{grid-template-columns:repeat(3,1fr);}.metrics3{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr!important;}}
.metric{background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:0.7rem 0.85rem;}
.metric-label{font-size:10px;color:#888;margin-bottom:3px;}
.metric-val{font-size:19px;font-weight:700;}
.metric-rank{font-size:10px;color:#aaa;margin-top:2px;}
.pos{color:#1a9e5c;}.neg{color:#d63a3a;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:0.75rem;}
.card{background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:0.85rem 1rem;}
.card-title{font-size:11px;font-weight:600;color:#888;margin-bottom:0.6rem;}
.detail-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.detail-tbl td{padding:5px 0;border-bottom:1px solid #f0f0f0;}
.detail-tbl td:nth-child(2){text-align:right;font-weight:600;}
.detail-tbl td:last-child{text-align:right;font-size:10px;color:#aaa;padding-left:6px;}
.radar-note{font-size:10px;color:#aaa;text-align:center;margin-top:6px;}
.all-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:0.75rem;}
@media(max-width:600px){.all-stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-pill{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:0.55rem 0.75rem;display:flex;justify-content:space-between;align-items:center;}
.stat-pill-label{font-size:10px;color:#888;}
.stat-pill-val{font-size:13px;font-weight:700;}
.matchup-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
.mc{border-radius:8px;padding:0.55rem 0.5rem;text-align:center;}
.mc-name{font-size:12px;font-weight:600;margin-bottom:2px;}
.mc-grade{font-size:11px;font-weight:600;margin-bottom:2px;}
.mc-detail{font-size:10px;opacity:0.8;}
.gA{background:#e8f5e9;color:#1b5e20;}.gB{background:#e3f2fd;color:#0d47a1;}
.gC{background:#f5f5f5;color:#777;}.gD{background:#fff3e0;color:#e65100;}
.gE{background:#ffebee;color:#b71c1c;}.gN{background:#f5f5f5;color:#bbb;}
.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.legend span{font-size:10px;padding:2px 8px;border-radius:4px;}
.hitokoto-block{border-radius:10px;padding:1rem 1.1rem;margin-top:0.85rem;}
.hitokoto-block.s3{background:#e8f4fd;border:1px solid #bbdefb;border-left:4px solid #4a90d9;}
.hitokoto-block.all{background:#fff8e1;border:1px solid #ffe082;border-left:4px solid #f39c12;}
.hitokoto-label{font-size:11px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.hitokoto-label.s3{color:#1565c0;}
.hitokoto-label.all{color:#e65100;}
.hitokoto-text{font-size:12px;color:#333;line-height:1.85;}
</style>

function buildMatchup(mu,label,name){
  const rows=ALL_MEMBERS.filter(opp=>opp!==name).map(opp=>{
    if(!mu[opp]) return `<div class="mc gN"><div class="mc-name">${dn(opp)}</div><div class="mc-grade">同卓なし</div><div class="mc-detail"></div></div>`;
    const [g,wr,rp]=mu[opp];
    const flag=g<=3?' <span style="font-size:9px;color:#aaa;">△要観察</span>':'';
    const wrCls=wr>=60?'gA':wr>=50?'gB':wr>=40?'gC':wr>=30?'gD':'gE';
    const rpStr=rp>=0?`+${rp.toFixed(1)}`:`${rp.toFixed(1)}`;
    return `<div class="mc ${wrCls}"><div class="mc-name">${dn(opp)}${flag}</div><div class="mc-grade">上回り率 ${wr.toFixed(1)}%</div><div class="mc-detail">相対 ${rpStr}pt / ${g}戦</div></div>`;
  });
  return `<div class="card" style="margin-bottom:0.75rem;">
    <div class="card-title">🤝 同卓相性（${label}）<span style="font-weight:400;margin-left:4px;font-size:10px;">上回り率 ＋ 相対パフォーマンス差</span></div>
    <div class="matchup-grid">${rows.join('')}</div>
    <div class="legend">
      <span class="gA">優勢(60%〜)</span><span class="gB">やや優勢(50%〜)</span>
      <span class="gC">拮抗(40%〜)</span><span class="gD">やや不利(30%〜)</span><span class="gE">不利(〜30%)</span>
    </div>
  </div>`;
}

    <div class="metric"><div class="metric-label">🥇 Top率</div><div class="metric-val">${pct(d.topRate)}</div><div class="metric-rank">WG ${dr.topRate}位</div></div>
    <div class="metric"><div class="metric-label">💰 累計Pts</div><div class="metric-val ${pc(d.totalPts)}">${ps(d.totalPts)}</div><div class="metric-rank">WG ${dr.totalPts}位</div></div>
    <div class="metric"><div class="metric-label">📈 Pts/G</div><div class="metric-val ${pc(d.ptsPerGame)}">${ps(f1(d.ptsPerGame))}</div><div class="metric-rank">WG ${dr.ptsPerGame}位</div></div>
  </div>`;

  const s3Detail=`<div class="two-col" style="margin-bottom:0.75rem;">
    <div class="card">
      <div class="card-title">📡 能力レーダー（最新シーズン）</div>
      <canvas id="radar-${name}" width="200" height="175"></canvas>
      <div class="radar-note">※ WG内順位をスコア化（1位=100、9位=0）</div>
    </div>
    <div class="card">
      <div class="card-title">📋 詳細指標</div>
      <table class="detail-tbl">
        <tr><td style="color:#888;">連帯率</td><td>${pct(d.renRate)}</td><td>WG ${dr.renRate}位</td></tr>
        <tr><td style="color:#888;">4着回避率</td><td>${pct(d.avoidRate)}</td><td>WG ${dr.avoidRate}位</td></tr>
        <tr><td style="color:#888;">ラス率</td><td class="neg">${pct(d.lastRate)}</td><td></td></tr>
        <tr><td style="color:#888;">プラス率</td><td>${pct(d.plusRate)}</td><td>WG ${dr.plusRate}位</td></tr>
        <tr><td style="color:#888;">標準偏差</td><td>${f1(d.stdDev)}</td><td>WG ${dr.stdDev}位</td></tr>
        <tr><td style="color:#888;">1着時Pts</td><td class="pos">${ps(f1(d.avgPts1st))}</td><td>WG ${dr.avgPts1st}位</td></tr>
        <tr><td style="color:#888;">4着時Pts</td><td class="neg">${ps(f1(d.avgPts4th))}</td><td></td></tr>
        <tr><td style="color:#888;">直近20戦</td><td>${f2(d.recentAvgRank)}</td><td>${d.recentAvgRank>d.avgRank?'↓ やや低下':d.recentAvgRank<d.avgRank?'↑ 上昇中':'→ 横ばい'}</td></tr>
      </table>
    </div>
  </div>`;

  // 全期間通算指標
  const allMetrics=`<div class="metrics3">
    <div class="metric"><div class="metric-label">📊 通算半荘数</div><div class="metric-val">${da.games}<span style="font-size:13px;color:#888;font-weight:400;">G</span></div></div>
    <div class="metric"><div class="metric-label">🎯 全期間平均順位</div><div class="metric-val">${f2(da.avgRank)}</div><div class="metric-rank">WG ${dra.avgRank}位</div></div>
    <div class="metric"><div class="metric-label">💰 全期間累計Pts</div><div class="metric-val ${pc(da.totalPts)}">${ps(da.totalPts)}</div><div class="metric-rank">WG ${dra.totalPts}位</div></div>
  </div>
  <div class="all-stats-grid" style="grid-template-columns:repeat(3,1fr);">
    <div class="stat-pill"><span class="stat-pill-label">Pts/G（全期間）</span><span class="stat-pill-val ${pc(da.ptsPerGame)}">${ps(f1(da.ptsPerGame))}</span></div>
    <div class="stat-pill"><span class="stat-pill-label">Top率（全期間）</span><span class="stat-pill-val">${pct(da.topRate)} <small style="color:#aaa;font-size:10px;">WG${dra.topRate}位</small></span></div>
    <div class="stat-pill"><span class="stat-pill-label">連帯率（全期間）</span><span class="stat-pill-val">${pct(da.renRate)} <small style="color:#aaa;font-size:10px;">WG${dra.renRate}位</small></span></div>
    <div class="stat-pill"><span class="stat-pill-label">標準偏差（全期間）</span><span class="stat-pill-val">${f1(da.stdDev)} <small style="color:#aaa;font-size:10px;">WG${dra.stdDev}位</small></span></div>
    <div class="stat-pill"><span class="stat-pill-label">MaxPts</span><span class="stat-pill-val pos">+${da.maxPts}</span></div>
    <div class="stat-pill"><span class="stat-pill-label">MinPts</span><span class="stat-pill-val neg">${da.minPts}</span></div>
    <div class="stat-pill"><span class="stat-pill-label">1着時平均Pts</span><span class="stat-pill-val pos">+${f1(da.avgPts1st)} <small style="color:#aaa;font-size:10px;">WG${dra.avgPts1st}位</small></span></div>
    <div class="stat-pill"><span class="stat-pill-label">4着時平均Pts</span><span class="stat-pill-val neg">${f1(da.avgPts4th)}</span></div>
    <div class="stat-pill"><span class="stat-pill-label">着順（1/2/3/4）</span><span class="stat-pill-val" style="font-size:11px;">${da.r1}/${da.r2}/${da.r3}/${da.r4}</span></div>
  </div>`;

  return `
  <div class="hero">
    <div class="avatar" style="background:${p.color}22;color:${p.color};">${p.initials}</div>
    <div><div class="hero-name" style="color:${p.color};">${dn(name)}</div><div class="type-badge">${p.type}</div></div>
  </div>

  <div class="section-block s3">
    <div class="section-label s3">📅 最新シーズン</div>
    ${s3Metrics}${s3Detail}
    ${buildMatchup(muS3,'最新シーズン',name)}
    <div class="hitokoto-block s3">
      <div class="hitokoto-label s3">💬 AIからヒトコト｜最新シーズン</div>
      <div class="hitokoto-text">${p.s3}</div>
    </div>
  </div>

  <div class="section-block all">
    <div class="section-label all">🏆 全期間通算</div>
    ${allMetrics}
    ${buildMatchup(muAll,'全期間通算',name)}
    <div class="hitokoto-block all">
      <div class="hitokoto-label all">💬 AIからヒトコト｜全期間通算</div>
      <div class="hitokoto-text">${p.all}</div>
    </div>
  </div>`;
}

const container=document.getElementById('pages-container');
const navLinks=document.getElementById('nav-links');
ALL_MEMBERS.forEach((name,i)=>{
  const div=document.createElement('div');
  div.className='page'+(i===0?' active':'');
  div.id='page-'+name;
  div.innerHTML=buildPage(name);
  container.appendChild(div);
  const a=document.createElement('a');
  a.href='#'; a.textContent=dn(name);
  if(i===0)a.className='active';
  a.onclick=e=>{e.preventDefault();showPage(name);};
  navLinks.appendChild(a);
});

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav a').forEach(a=>{if(a.textContent===dn(name))a.classList.add('active');});
  drawRadar(name);
}

let drawn={};
function drawRadar(name){
  if(drawn[name])return;
  drawn[name]=true;
  const canvas=document.getElementById('radar-'+name);
  if(!canvas)return;
  // Retina/高DPIディスプレイ対応
  const dpr=window.devicePixelRatio||1;
  const dispW=200,dispH=175;
  canvas.width=dispW*dpr;
  canvas.height=dispH*dpr;
  canvas.style.width=dispW+'px';
  canvas.style.height=dispH+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const rr=RADAR_RANKS[name],p=PROFILES[name];
  const labels=['Top率','連帯率','4着\n回避','プラス率','安定性','得点力'];
  const scores=rr.map(r=>r2s(r));
  const W=dispW,H=dispH,cx=W/2,cy=H/2-5,R=Math.min(W,H)*0.32,n=6;
  ctx.clearRect(0,0,W,H);
  for(let lv=1;lv<=4;lv++){
    ctx.beginPath();
    for(let i=0;i<n;i++){const a=Math.PI/2+i*2*Math.PI/n,r=R*lv/4;i===0?ctx.moveTo(cx+r*Math.cos(-a),cy-r*Math.sin(-a)):ctx.lineTo(cx+r*Math.cos(-a),cy-r*Math.sin(-a));}
    ctx.closePath();ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;ctx.stroke();
  }
  for(let i=0;i<n;i++){const a=Math.PI/2+i*2*Math.PI/n;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(-a),cy-R*Math.sin(-a));ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();
  for(let i=0;i<n;i++){const a=Math.PI/2+i*2*Math.PI/n,r=R*scores[i]/100;i===0?ctx.moveTo(cx+r*Math.cos(-a),cy-r*Math.sin(-a)):ctx.lineTo(cx+r*Math.cos(-a),cy-r*Math.sin(-a));}
  ctx.closePath();ctx.fillStyle=p.color+'33';ctx.fill();ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#555';ctx.font='10px Arial';ctx.textAlign='center';
  for(let i=0;i<n;i++){const a=Math.PI/2+i*2*Math.PI/n,r=R+16,lx=cx+r*Math.cos(-a),ly=cy-r*Math.sin(-a);const ls=labels[i].split('\n');ls.forEach((l,li)=>ctx.fillText(l,lx,ly+li*12-(ls.length-1)*6));}
}
showPage(ALL_MEMBERS[0]);
</script>
</body>
</html>
