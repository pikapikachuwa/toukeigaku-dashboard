const N=9;
function r2s(r){return Math.round((N-r)/(N-1)*100);}
function ps(n){return n==null?'-':(n>0?'+':'')+n;}
function f1(n){return n==null?'-':Number(n).toFixed(1);}
function f2(n){return n==null?'-':Number(n).toFixed(2);}
function pct(n){return n==null?'-':f1(n)+'%';}
function pc(n){return n>0?'pos':n<0?'neg':'';}
function grade(avg){
  if(avg==null)return null;
  if(avg>=10) return{label:'超得意！',cls:'gA'};
  if(avg>=3)  return{label:'得意！',  cls:'gB'};
  if(avg>=-3) return{label:'普通～',  cls:'gC'};
  if(avg>=-10)return{label:'苦手！',  cls:'gD'};
  return           {label:'超苦手！', cls:'gE'};
}

    hitokoto:'📈 前シーズンは「準優勝の申し子」として2位ばかり取っていたが、Season2では着実に進化を遂げWG3位に躍り出た。136半荘という膨大な経験値がついに実を結んだ形。直近20戦もさらに改善しており、来シーズンはいよいよ王座争いに絡んでくるかもしれない。'},
  '大塚':{type:'💀 最多参加・最多損失の男',color:'#e74c3c',initials:'大',
    strong:'141半荘参加はWG断トツ1位のフル参戦。それだけ場に来続ける情熱と継続力は本物。大塚との同卓成績を見ると、多くのメンバーがプラスになっており、いわばWGの「献上係」として貢献している笑',
    weak:'累計-1362はWG最下位で、141半荘という最多参加で最大の損失という衝撃の組み合わせ。Top率16.3%・Pts/G-9.7はいずれもWG最下位。直近20戦の平均順位3.05と終盤も苦しい状況が続く。',
    trend:'直近20戦の平均順位3.05は全体成績2.72から大幅悪化。終盤にかけてさらに苦戦中。',
    hitokoto:'💀 141半荘という誰よりも多い参加数で-1362という誰よりも大きな損失。量は質をカバーできなかった1年間。しかしそれだけ参加し続けるメンタルは称賛に値する。来シーズンは「量より質」を意識した戦略が必要かもしれない。その情熱が正しい方向に向いた時、大塚は化ける可能性を秘めている。'},
  '矢嶋':{type:'🎭 善戦も結果に結びつかない',color:'#c0392b',initials:'矢',
    strong:'120半荘参加でWG内での経験も豊富。河井との同卓では+13.6と得意な相性。標準偏差43.1はWG3位と比較的安定したプレースタイル。',
    weak:'累計-418・Pts/G-3.5とマイナス圏。岡崎との同卓は-10.3（苦手）、土岐との同卓も-4.9と上位勢には苦戦。本井との同卓はサンプル数が少ないが-46.3という極端な数字が出ている。',
    trend:'直近20戦の平均順位2.45は全体成績2.58から改善。終盤にかけて調子を上げてきている兆しがある。',
    hitokoto:'🎭 120半荘という豊富な経験があるのにPts/G-3.5と結果が出ていない。しかし直近20戦の改善は本物の変化のサインかもしれない。このWGで「じわじわ上昇中」の枠に入ってきており、来シーズンはプラス転換のチャンスが十分ある。諦めずに経験を積み続けた者だけが見える景色がある。'},
  '本井':{type:'🔍 26半荘の挑戦者',color:'#f39c12',initials:'本',
    strong:'26半荘というサンプルながら、1着時平均Pts66.8はWG3位と勝ちゲームの質は高い。大塚との同卓では+17.3と好相性。岡崎との同卓も+6.1とプラス。',
    weak:'参加26半荘はWG最少で、全体評価が難しい。本井との同卓で矢嶋が-46.3という極端な数字が出ており、特定の相手との相性差が大きい。4着回避率65.4%はWG最下位。',

    hitokoto:'🔍 26半荘のデータではまだ全貌が見えない。ただ1着時の得点力はWG上位で、勝てる時はきっちり勝てる実力を持っている。問題はラスの多さ（4着回避率65.4%）で、これを改善できれば一気に上位争いに絡める可能性がある。Season3での本格参戦でその実力を見せてほしい。'},
};

let radarCharts={};
function buildPage(name){
  const d=DATA[name],p=PROFILES[name],dr=DETAIL_RANKS[name],rr=RADAR_RANKS[name],mu=MATCHUP[name]||{};
  const ptsRank=PTS_RANK[name];

  const detailRows=[
    ['連帯率',pct(d.renRate),'WG '+dr.renRate+'位'],
    ['4着回避率',pct(d.avoidRate),'WG '+dr.avoidRate+'位'],
    ['ラス率',pct(d.lastRate),''],
    ['プラス率',pct(d.plusRate),'WG '+dr.plusRate+'位'],
    ['標準偏差',f1(d.stdDev),'WG '+dr.stdDev+'位'],
    ['1着時Pts',ps(f1(d.avgPts1st)),'WG '+dr.avgPts1st+'位'],
    ['4着時Pts',ps(f1(d.avgPts4th)),''],
    ['MaxPts',ps(d.maxPts),''],
    ['直近20戦順位',f2(d.recent20AvgRank),d.recent20AvgRank>d.avgRank?'↓ やや低下':d.recent20AvgRank<d.avgRank?'↑ 上昇中':'→ 横ばい'],
  ];

  const detailHTML=detailRows.map(([label,val,rank])=>`
    <tr><td style="color:#888;padding:5px 0;border-bottom:1px solid #f5f5f5;">${label}</td>
    <td style="text-align:right;font-weight:600;padding:5px 0;border-bottom:1px solid #f5f5f5;">${val}</td>
    <td style="text-align:right;font-size:10px;color:#aaa;padding:5px 0 5px 6px;border-bottom:1px solid #f5f5f5;">${rank}</td></tr>
  `).join('');

  const matchupOrder=ALL_MEMBERS.filter(m=>m!==name);
  const matchupHTML=matchupOrder.map(opp=>{
    const m=mu[opp];const g=m?grade(m[1]):null;
    return`<div class="mc ${g?g.cls:'gN'}">
      <div class="mc-name">${opp}</div>
      <div class="mc-grade">${g?g.label:'－'}</div>
      <div class="mc-detail">${m?m[1].toFixed(1)+' / '+m[0]+'回':'同卓なし'}</div>
    </div>`;
  }).join('');

  return`
  <div class="hero">
    <div class="avatar" style="background:${p.color}22;color:${p.color};">${p.initials}</div>
    <div style="flex:1;">
      <div class="hero-name" style="color:${p.color};">${name}</div>
      <div class="type-badge">${p.type}</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:#aaa;">参加半荘数</div>
      <div style="font-size:24px;font-weight:700;color:#333;">${d.games}</div>
      <div style="font-size:10px;color:#aaa;">WG ${dr.games}位</div>
    </div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">累計Pts</div><div class="metric-val ${pc(d.totalPts)}">${ps(d.totalPts)}</div><div class="metric-rank">WG ${ptsRank}位</div></div>
    <div class="metric"><div class="metric-label">Pts/G</div><div class="metric-val ${pc(d.ptsPerGame)}">${ps(f1(d.ptsPerGame))}</div><div class="metric-rank">WG ${dr.ptsPerGame}位</div></div>
    <div class="metric"><div class="metric-label">Top率</div><div class="metric-val">${pct(d.topRate)}</div><div class="metric-rank">WG ${dr.topRate}位</div></div>
    <div class="metric"><div class="metric-label">平均順位</div><div class="metric-val">${f2(d.avgRank)}</div><div class="metric-rank">WG ${dr.avgRank}位</div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">📡 能力レーダー</div>
      <div style="height:220px;position:relative;"><canvas id="radar-${name}" role="img" aria-label="${name}の能力レーダー">${name}の能力レーダー</canvas></div>
      <div class="radar-note">※ WG内順位をスコア化（1位=100、9位=0）</div>
    </div>
    <div class="card">
      <div class="card-title">📊 詳細指標</div>
      <table style="width:100%;font-size:12px;border-collapse:collapse;">${detailHTML}</table>
    </div>
  </div>
  <div class="card" style="margin-bottom:1rem;">
    <div class="card-title">🔍 データ分析</div>
    <div class="analysis-block"><div class="analysis-label">📈 強み</div><div class="analysis-text">${p.strong}</div></div>
    <div class="analysis-block"><div class="analysis-label">⚠️ 課題</div><div class="analysis-text">${p.weak}</div></div>
    <div class="analysis-block" style="margin-bottom:0;"><div class="analysis-label">📉 直近の傾向</div><div class="analysis-text">${p.trend}</div></div>
  </div>
  <div class="hitokoto" style="margin-bottom:1rem;">
    <div class="hitokoto-title">🤖 AIからヒトコト</div>
    <div class="hitokoto-text">${p.hitokoto}</div>
  </div>
  <div class="card">
    <div class="card-title">🀄 同卓分析</div>
    <p style="font-size:11px;color:#aaa;margin-bottom:12px;">各メンバーと同卓した半荘での補正済み平均差分をもとに相性を評価（全体的な強さの影響を除外）</p>
    <div class="matchup-grid">${matchupHTML}</div>
    <div class="legend">
      <span class="gA">超得意！(+10以上)</span>
      <span class="gB">得意！(+3〜+10)</span>
      <span class="gC">普通～(-3〜+3)</span>
      <span class="gD">苦手！(-10〜-3)</span>
      <span class="gE">超苦手！(-10未満)</span>
    </div>
  </div>`;
}

function buildRadar(name){
  if(radarCharts[name])radarCharts[name].destroy();
  const rr=RADAR_RANKS[name],p=PROFILES[name],avg=r2s(5);
  const ctx=document.getElementById('radar-'+name);if(!ctx)return;
  radarCharts[name]=new Chart(ctx.getContext('2d'),{
    type:'radar',
    data:{labels:['Top率','連帯率','4着回避率','プラス率','安定性','得点力'],datasets:[
      {label:dn(name),data:rr.map(r=>r2s(r)),borderColor:p.color,backgroundColor:p.color+'26',borderWidth:2,pointBackgroundColor:p.color,pointRadius:4},
      {label:'WG平均',data:[avg,avg,avg,avg,avg,avg],borderColor:'#ccc',backgroundColor:'rgba(200,200,200,0.08)',borderWidth:1.5,pointBackgroundColor:'#ccc',pointRadius:3,borderDash:[4,3]}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12,padding:8}},tooltip:{callbacks:{label:ctx=>{const r=Math.round(N-ctx.raw*(N-1)/100);return ctx.dataset.label+': WG '+r+'位相当';}}}},
      scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:9},color:'#bbb',backdropColor:'transparent',callback:v=>v===0?'9位':v===50?'5位':v===100?'1位':''},grid:{color:'rgba(0,0,0,0.06)'},pointLabels:{font:{size:11}}}}}
  });
}

let current='';
function showPage(name){
  if(current===name)return;current=name;
  document.querySelectorAll('.nav a[id^="nav-"]').forEach(a=>a.classList.remove('active'));
  const el=document.getElementById('nav-'+name);if(el)el.classList.add('active');
  document.getElementById('main-container').innerHTML=buildPage(name);
  setTimeout(()=>buildRadar(name),100);
}
showPage('土岐');
</script>
</body>
</html>
